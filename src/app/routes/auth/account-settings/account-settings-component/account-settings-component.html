<h1>My account</h1>

<h2>Change password</h2>
<p-inplace class="flex items-center" >
    <ng-template #display>
        <div class="flex flex-col gap-2">
            <p-floatlabel variant="on">
                <p-password [(ngModel)]="shownPasswordValue" [disabled]="true" inputId="old_password" class="pointer-events-none"/>
                <label for="old_password">Old password</label>
            </p-floatlabel>

            <p-floatlabel variant="on">
                <p-password [(ngModel)]="shownPasswordValue" [disabled]="true" inputId="new_password" class="pointer-events-none"/>
                <label for="new_password">New password</label>
            </p-floatlabel>
        </div>
    </ng-template>
    <ng-template #content let-closeCallback="closeCallback">
        <span class="inline-flex items-center gap-2">
            <form #form="ngForm" (ngSubmit)="onSubmit('password', updatePasswordModel, () => closeCallback($event))" class="flex flex-col gap-4">
                <p-floatlabel variant="on">
                    <p-password [(ngModel)]="updatePasswordModel.oldPassword" #model="ngModel" autocomplete="current-password" name="current-password" [toggleMask]="true" required />
                    <label for="old_password">Old password</label>
                </p-floatlabel>
                
                <p-floatlabel variant="on">
                    <p-password [(ngModel)]="updatePasswordModel.newPassword" #model="ngModel" autocomplete="new-password" name="new-password" [toggleMask]="true" [autofocus]="true" required />
                    <label for="new_password">New password</label>
                </p-floatlabel>
                
                <button pButton type="submit" severity="contrast" icon="pi pi-check" label="Save new password"></button>
            </form>
        </span>
    </ng-template>
</p-inplace>
